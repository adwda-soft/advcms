{% extends "base.html" %}

{% block title %}Create Account - ADVCMS{% endblock %}

{% block content %}
<div class="glass-panel">
    <h2 class="form-title">Join Us</h2>
    <p class="form-subtitle">Create your account to unlock dashboard access.</p>

    {% if error %}
        <div class="alert alert-danger">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <span>{{ error }}</span>
        </div>
    {% endif %}

    <form method="POST" action="/register">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn-primary">Register Account</button>
    </form>

    <div class="form-footer">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>
{% endblock %}
